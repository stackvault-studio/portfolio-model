name: Build, Test & Publish

on:
  push:
    branches:
      - dev
      - 'feature/*'
      - 'fix/*'
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Determine version
        id: version
        run: |
          if [[ $GITHUB_REF =~ ^refs/tags/v ]]; then
            VERSION=${GITHUB_REF_NAME#v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          elif [[ $GITHUB_REF == 'refs/heads/dev' ]]; then
            echo "version=1.0.0-SNAPSHOT" >> $GITHUB_OUTPUT
          else
            echo "version=1.0.0-staging-SNAPSHOT" >> $GITHUB_OUTPUT
          fi

      - name: Set version
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Build & Test
        run: mvn clean package -DskipTests=false

      - name: Publish to GitHub Packages
        run: mvn deploy -s settings.xml -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_ACTOR: ${{ vars.GH_ACTOR }}
